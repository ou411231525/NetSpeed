name: NetSpeed
options:
  bundleIdPrefix: com.netspeed
  deploymentTarget:
    iOS: "16.1"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  NetSpeed:
    type: application
    platform: iOS
    sources:
      - path: NetSpeed
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.netspeed.monitor
        INFOPLIST_FILE: NetSpeed/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        IPHONEOS_DEPLOYMENT_TARGET: "16.1"
        CODE_SIGN_ENTITLEMENTS: NetSpeed/NetSpeed.entitlements
    entitlements:
      path: NetSpeed/NetSpeed.entitlements
    dependencies:
      - target: NetSpeedWidgetExtension
        embed: true
      - target: NetSpeedLiveActivityExtension
        embed: true

  NetSpeedWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: NetSpeedWidget
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.netspeed.monitor.widget
        INFOPLIST_FILE: NetSpeedWidget/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "16.1"
        CODE_SIGN_ENTITLEMENTS: NetSpeedWidget/NetSpeedWidget.entitlements
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    entitlements:
      path: NetSpeedWidget/NetSpeedWidget.entitlements

  NetSpeedLiveActivityExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: NetSpeedLiveActivity
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.netspeed.monitor.liveactivity
        INFOPLIST_FILE: NetSpeedLiveActivity/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "16.1"
        CODE_SIGN_ENTITLEMENTS: NetSpeedLiveActivity/NetSpeedLiveActivity.entitlements
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    entitlements:
      path: NetSpeedLiveActivity/NetSpeedLiveActivity.entitlements

schemes:
  NetSpeed:
    build:
      targets:
        NetSpeed: all
        NetSpeedWidgetExtension: all
        NetSpeedLiveActivityExtension: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
