name: Build iOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  build:
    name: Build NetSpeed
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug directory structure
        run: |
          echo "=== Current directory ==="
          pwd
          echo ""
          echo "=== Directory contents ==="
          ls -la
          echo ""
          echo "=== Subdirectories ==="
          find . -maxdepth 2 -type d
          echo ""
          echo "=== NetSpeed directory ==="
          ls -la NetSpeed/ 2>/dev/null || echo "NetSpeed dir not found"
          echo ""
          echo "=== NetSpeedWidget directory ==="
          ls -la NetSpeedWidget/ 2>/dev/null || echo "NetSpeedWidget dir not found"
          echo ""
          echo "=== NetSpeedLiveActivity directory ==="
          ls -la NetSpeedLiveActivity/ 2>/dev/null || echo "NetSpeedLiveActivity dir not found"

      - name: List available simulators
        run: xcrun simctl list devices available | grep -E "iPhone"

      - name: Generate Xcode project
        run: |
          which xcodegen || brew install xcodegen
          xcodegen generate

      - name: Build iOS App
        run: |
          xcodebuild -project NetSpeed.xcodeproj \
            -scheme NetSpeed \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=18.2' \
            -derivedDataPath ./DerivedData \
            build CODE_SIGNING_ALLOWED=NO

      - name: Check build status
        run: |
          if [ -d "./DerivedData/Build/Products/Debug-iphonesimulator/NetSpeed.app" ]; then
            echo "Build successful!"
            ls -la ./DerivedData/Build/Products/Debug-iphonesimulator/
          else
            echo "Build failed!"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetSpeed-App
          path: ./DerivedData/Build/Products/Debug-iphonesimulator/NetSpeed.app
          retention-days: 7
