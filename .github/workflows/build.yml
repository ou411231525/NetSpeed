name: Build iOS App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

jobs:
  build:
    name: Build NetSpeed
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug and fix directory structure
        run: |
          echo "=== Current directory ==="
          pwd
          echo ""
          echo "=== Directory contents ==="
          ls -la
          echo ""
          echo "=== Looking for swift files ==="
          find . -name "*.swift" -type f | head -20
          echo ""
          echo "=== Checking for NetSpeed subdirectory ==="
          if [ -d "NetSpeed" ]; then
            echo "NetSpeed directory exists"
            ls -la NetSpeed/
          else
            echo "NetSpeed directory NOT found - need to create"
            # Check if we have flat structure and need to reorganize
            if [ -f "NetSpeedApp.swift" ]; then
              echo "Creating NetSpeed directory..."
              mkdir -p NetSpeed
              # Move files to NetSpeed directory
              for f in *.swift *.plist *.entitlements; do
                if [ -f "$f" ]; then
                  mv "$f" NetSpeed/ 2>/dev/null || true
                fi
              done
              # Move directories
              for d in Extensions Models Resources Services ViewModels Views; do
                if [ -d "$d" ]; then
                  mv "$d" NetSpeed/ 2>/dev/null || true
                fi
              done
              echo "Reorganization complete"
              ls -la
              echo ""
              echo "NetSpeed contents:"
              ls -la NetSpeed/
            fi
          fi

      - name: List available simulators
        run: xcrun simctl list devices available | grep -E "iPhone"

      - name: Generate Xcode project
        run: |
          which xcodegen || brew install xcodegen
          xcodegen generate

      - name: Build iOS App
        run: |
          xcodebuild -project NetSpeed.xcodeproj \
            -scheme NetSpeed \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=18.5' \
            -derivedDataPath ./DerivedData \
            build CODE_SIGNING_ALLOWED=NO 2>&1 | tee build_output.log
          echo ""
          echo "=== Build output (last 100 lines) ==="
          tail -100 build_output.log
          echo ""
          echo "=== Checking DerivedData structure ==="
          ls -la ./DerivedData/ 2>/dev/null || echo "DerivedData not found"
          ls -la ./DerivedData/Build/ 2>/dev/null || echo "Build directory not found"
          ls -la ./DerivedData/Build/Products/ 2>/dev/null || echo "Products directory not found"
          find ./DerivedData -type d -name "*.app" 2>/dev/null | head -10

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs
          path: ./build_output.log
          retention-days: 7

      - name: Check build status
        run: |
          echo "=== Looking for build output ==="
          find ./DerivedData -name "*.app" -type d 2>/dev/null | head -20
          echo ""
          if [ -d "./DerivedData/Build/Products/Debug-iphonesimulator/NetSpeed.app" ]; then
            echo "Build successful!"
            ls -la ./DerivedData/Build/Products/Debug-iphonesimulator/
          else
            echo "Checking alternative locations..."
            ls -la ./DerivedData/Build/Products/ 2>/dev/null || echo "Products directory not found"
            ls -la ./DerivedData/ 2>/dev/null || echo "DerivedData directory not found"
            echo "=== Build log (last 50 lines) ==="
            tail -50 build_output.log 2>/dev/null || echo "No build log found"
            exit 1
          fi

      - name: Package build output
        run: |
          if [ -d "./DerivedData/Build/Products/Debug-iphonesimulator/NetSpeed.app" ]; then
            cd ./DerivedData/Build/Products/Debug-iphonesimulator
            zip -r NetSpeed.app.zip NetSpeed.app
            echo "Package created successfully"
            ls -la NetSpeed.app.zip
          else
            echo "ERROR: NetSpeed.app not found"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NetSpeed-App
          path: ./DerivedData/Build/Products/Debug-iphonesimulator/NetSpeed.app.zip
          retention-days: 7
